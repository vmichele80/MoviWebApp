<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Nights at Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-body">

<nav class="navbar navbar-expand-lg app-navbar shadow-sm">
    <div class="container d-flex align-items-center justify-content-between">

        <!-- Left: Logo -->
        <a class="navbar-brand app-brand m-0 ms-3" href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='movie_site_title.png') }}"
                 alt="Movie Nights at Home"
                 height="40">
        </a>

        <!-- Right: Button -->
        <a href="{{ url_for('index') }}" class="btn btn-app-secondary me-3">
            Back to users
        </a>

    </div>
</nav>

<main class="container py-4">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="alert app-alert alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
