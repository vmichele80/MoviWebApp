{% extends "base.html" %}

{% block content %}
    <h1>Users</h1>

    <ul>
        {% for user in users %}
            <li>
                <a href="{{ url_for('get_list_of_users_favorites', user_id=user.id) }}">
                    {{ user.name }}
                </a>
            </li>
        {% endfor %}
    </ul>

    <h2>Add New User</h2>

    <form action="{{ url_for('create_user') }}" method="post">
        <label for="name">User name:</label>
        <input type="text" id="name" name="name" required>
        <button type="submit">Add User</button>
    </form>
{% endblock %}
